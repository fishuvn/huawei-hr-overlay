name: Release

on:
  workflow_dispatch: # Dòng này cho phép bấm nút chạy bằng tay
  push:
    branches:
      - main
    tags:
      - "v*.*.*" # Kích hoạt khi push tag như v1.0.0

permissions:
  contents: write # Quyền tạo Release và upload Assets

jobs:
  build-and-release:
    name: Build & Publish Release
    runs-on: windows-latest

    steps:
      # ── Checkout code ──────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── Setup .NET 8 SDK ──────────────────────────────────────
      - name: Setup .NET 8 SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      # ── Restore & Publish ─────────────────────────────────────
      - name: Publish Single-file EXE
        shell: pwsh
        run: |
          # Xóa thư mục publish nếu đã tồn tại để tránh rác
          if (Test-Path "./publish") { Remove-Item -Recurse -Force ./publish }

          # Publish project
          dotnet publish HuaweiHROverlay/HuaweiHROverlay.csproj `
            -c Release `
            -r win-x64 `
            --self-contained false `
            -p:PublishSingleFile=true `
            -p:IncludeNativeLibrariesForSelfExtract=true `
            -o ./publish

      # ── Rename with version tag ────────────────────────────────
      - name: Rename EXE with version
        shell: pwsh
        run: |
          $tag = "${{ github.ref_name }}"
          $src = "publish\HuaweiHROverlay.exe"
          $dst = "publish\HuaweiHROverlay-$tag-win-x64.exe"

          if (Test-Path $src) {
              Rename-Item $src $dst
              Write-Host "Successfully renamed to: $dst"
          } else {
              Write-Error "Source file not found: $src"
              exit 1
          }

      # ── Create GitHub Release ──────────────────────────────────
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "Huawei HR Overlay ${{ github.ref_name }}"
          tag_name: ${{ github.ref_name }}
          body: |
            ## Huawei HR Overlay ${{ github.ref_name }}

            Real-time Huawei Watch/Band heart rate overlay for OBS Studio.

            ### ⚠️ Prerequisite
            Install the [.NET 8 Desktop Runtime (x64)](https://dotnet.microsoft.com/en-us/download/dotnet/8.0/runtime) before running.

            **Quick install via winget:**
            ```powershell
            winget install Microsoft.DotNet.DesktopRuntime.8
            ```

            ### 🚀 Quick Start
            1. Enable **HR Data Broadcasts** on your Huawei watch: `Settings → HR Data Broadcasts → ON`.
            2. Run `HuaweiHROverlay-${{ github.ref_name }}-win-x64.exe`.
            3. Click **Scan**, select your watch, and click **Connect**.
            4. In OBS: Add **Browser Source** → URL: `http://localhost:8764/` → Size: `400×120` px.

            ---
            *See the [README](https://github.com/${{ github.repository }}/blob/main/README.md) for full setup guide.*
          files: publish/HuaweiHROverlay-${{ github.ref_name }}-win-x64.exe
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

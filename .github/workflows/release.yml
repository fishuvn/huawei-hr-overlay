name: Release

on:
  push:
    tags:
      - 'v*.*.*'   # triggers on tags like v1.0.0, v1.2.3

permissions:
  contents: write  # needed to create GitHub Releases

jobs:
  build-and-release:
    name: Build & Publish Release
    runs-on: windows-latest

    steps:
      # ── Checkout ──────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── Setup .NET 8 SDK ──────────────────────────────────────
      - name: Setup .NET 8 SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      # ── Restore dependencies ───────────────────────────────────
      - name: Restore NuGet packages
        run: dotnet restore HuaweiHROverlay/HuaweiHROverlay.csproj

      # ── Publish single-file EXE ────────────────────────────────
      - name: Publish single-file EXE
        run: |
          dotnet publish HuaweiHROverlay/HuaweiHROverlay.csproj `
            -c Release `
            -r win-x64 `
            --self-contained false `
            -p:PublishSingleFile=true `
            -o ./publish

      # ── Rename with version tag ────────────────────────────────
      - name: Rename EXE with version
        shell: pwsh
        run: |
          $tag = "${{ github.ref_name }}"
          $src = "publish\HuaweiHROverlay.exe"
          $dst = "publish\HuaweiHROverlay-$tag-win-x64.exe"
          Rename-Item $src $dst
          Write-Host "Renamed to: $dst"
          Get-Item $dst | Select-Object Name, @{N='Size (MB)';E={[math]::Round($_.Length/1MB,1)}}

      # ── Create GitHub Release ──────────────────────────────────
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "Huawei HR Overlay ${{ github.ref_name }}"
          body: |
            ## Huawei HR Overlay ${{ github.ref_name }}

            Real-time Huawei Watch/Band heart rate overlay for OBS Studio.

            ### ⚠️ Prerequisite
            Install the [.NET 8 Desktop Runtime (x64)](https://dotnet.microsoft.com/en-us/download/dotnet/8.0/runtime) before running.

            Quick install via winget:
            ```
            winget install Microsoft.DotNet.DesktopRuntime.8
            ```

            ### Setup
            1. Enable **HR Data Broadcasts** on your Huawei watch: `Settings → HR Data Broadcasts → ON`
            2. Run `HuaweiHROverlay.exe`
            3. Click **Scan**, select your watch, click **Connect**
            4. In OBS: Add **Browser Source** → `http://localhost:8764/` → 400×120 px

            See the [README](https://github.com/${{ github.repository }}/blob/main/README.md) for full setup guide.
          files: publish/HuaweiHROverlay-${{ github.ref_name }}-win-x64.exe
          draft: false
          prerelease: false
